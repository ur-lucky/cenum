name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, like v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-targets

      - name: Save Rust cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    env:
      BIN: cenum
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            executable: cenum
          - host: linux
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            executable: cenum
          - host: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            executable: cenum.exe
          - host: windows
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            label: windows-aarch64
            executable: cenum.exe
          - host: macos
            os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            executable: cenum
          - host: macos
            os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
            executable: cenum
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - name: Save Rust cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate artifact name
        shell: bash
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          echo "ARTIFACT_NAME=$BIN-${TAG_NAME#v}-${{ matrix.label }}.zip" >> "$GITHUB_ENV"

      - name: Stage release files
        shell: bash
        run: |
          mkdir staging
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" staging/
          cp README.md staging/
          cp cenum.example.yaml staging/

      - name: Create Windows archive
        if: matrix.host == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "staging/*" -DestinationPath "$env:ARTIFACT_NAME" -Force

      - name: Create Unix archive
        if: matrix.host != 'windows'
        shell: bash
        run: |
          cd staging
          zip "../$ARTIFACT_NAME" *

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release archives
        run: ls -la dist

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zip --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" \
              dist/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
